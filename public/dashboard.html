<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Movie Orbit | Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;700;800&family=Fraunces:opsz,wght@9..144,500;9..144,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="ambient-shape shape-a" aria-hidden="true"></div>
    <div class="ambient-shape shape-b" aria-hidden="true"></div>

    <main class="app-shell">
      <section class="hero card" data-reveal>
        <p class="eyebrow">Movie Watchlist Studio</p>
        <h1>Your Dashboard</h1>
        <p class="hero-copy">
          Browse movies, add them to your watchlist, and update your progress.
        </p>
        <div id="sessionPanel" class="session-panel">
          <p id="sessionText"></p>
          <button id="logoutButton" type="button" class="ghost">Logout</button>
        </div>
      </section>

      <section class="movies card" data-reveal>
        <div class="section-title">
          <h2>Movies</h2>
          <p>Add a movie to your watchlist from here.</p>
        </div>
        <div id="moviesGrid" class="movies-grid"></div>
      </section>

      <section class="watchlist card" data-reveal>
        <div class="section-title">
          <h2>Your Watchlist</h2>
          <p>Update progress or remove items anytime.</p>
        </div>
        <div id="watchlistGrid" class="watchlist-grid"></div>
      </section>
    </main>

    <div id="toast" role="status" aria-live="polite"></div>
    <script type="module" src="/app.js"></script>
  </body>
</html>
