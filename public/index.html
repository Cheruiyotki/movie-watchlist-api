<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Movie Orbit | Auth</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;700;800&family=Fraunces:opsz,wght@9..144,500;9..144,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="ambient-shape shape-a" aria-hidden="true"></div>
    <div class="ambient-shape shape-b" aria-hidden="true"></div>

    <main class="app-shell">
      <section class="hero card" data-reveal>
        <p class="eyebrow">Movie Watchlist Studio</p>
        <h1>Movie Orbit</h1>
        <p class="hero-copy">
          Sign in or create an account to access your dashboard and manage your
          watchlist.
        </p>
      </section>

      <section class="auth card" data-reveal>
        <div class="auth-header">
          <h2>Authentication</h2>
          <p>Use either option below to continue.</p>
        </div>

        <div class="auth-grid">
          <form id="registerForm" class="panel">
            <h3>Create account</h3>
            <label>
              Name
              <input name="name" type="text" required minlength="2" />
            </label>
            <label>
              Email
              <input name="email" type="email" required />
            </label>
            <label>
              Password
              <input name="password" type="password" required minlength="6" />
            </label>
            <button type="submit">Register</button>
          </form>

          <form id="loginForm" class="panel">
            <h3>Log in</h3>
            <label>
              Email
              <input name="email" type="email" required />
            </label>
            <label>
              Password
              <input name="password" type="password" required />
            </label>
            <button type="submit">Login</button>
          </form>
        </div>

      </section>
    </main>

    <div id="toast" role="status" aria-live="polite"></div>
    <script type="module" src="/auth.js"></script>
  </body>
</html>
